name: isimcebimde
description: "Saha satış ekipleri ve KOBİ'ler için offline teklif hazırlama uygulaması."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.12.2

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  # State management & DI
  flutter_riverpod: ^3.3.2
  riverpod_annotation: ^4.0.3

  # Veritabanı (offline-first, tek kaynak)
  drift: 2.34.0 # drift_dev 2.34.0 ile birebir eşleşmeli (schema tooling kırılıyor)
  drift_flutter: ^0.3.1
  sqlite3: ^3.4.0 # SqliteException: kısıt ihlallerini tip güvenli yakalamak için

  # Routing
  go_router: ^17.3.0

  # Teklif çıktısı ve paylaşım
  pdf: ^3.13.0
  printing: ^5.15.0
  share_plus: ^13.2.0

  # Firma logosu. image_picker galeriden görsel seçer; seçilen dosya OS'un
  # geçici klasöründedir ve silinebilir — path_provider ile uygulamanın belge
  # klasörüne kopyalanıp o yol saklanır (bkz. LogoStorage).
  image_picker: ^1.2.0
  path_provider: ^2.1.5

  intl: ^0.20.2 # flutter_localizations 0.20.2'ye sabitliyor, yükseltilemez
  meta: ^1.18.0 # domain/core katmanı saf Dart kalsın diye (foundation yerine)
  cupertino_icons: ^1.0.8

dev_dependencies:
  flutter_test:
    sdk: flutter

  # Bu üçlü aynı `analyzer` sürümü üzerinde buluşmak zorunda (analyzer 12).
  # Yükseltmeden önce `flutter pub get` ile birlikte doğrula.
  build_runner: ^2.15.1
  riverpod_generator: ^4.0.4
  drift_dev: ^2.34.0

  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.14.4
  # NOT: riverpod_lint/custom_lint şu an eklenemiyor — custom_lint `analyzer ^8`,
  # drift_dev ise daha yenisini istiyor. custom_lint yetişince geri eklenecek.
  # O zamana kadar Riverpod kuralları code review ile denetlenir.

flutter:
  uses-material-design: true
  generate: true

  assets:
    - assets/images/

  fonts:
    # Arayüz fontu (OFL, assets/fonts/Inter-LICENSE.txt). Dosyalar repoya gömülür:
    # `google_fonts` paketi fontu çalışma anında ağdan indirir ve offline-first
    # kuralını çiğner.
    - family: Inter
      fonts:
        - asset: assets/fonts/Inter-Regular.ttf
        - asset: assets/fonts/Inter-Medium.ttf
          weight: 500
        - asset: assets/fonts/Inter-SemiBold.ttf
          weight: 600
        - asset: assets/fonts/Inter-Bold.ttf
          weight: 700

    # PDF çıktısında Türkçe karakterleri (ç, ğ, ı, ö, ş, ü) doğru basmak için.
    # package:pdf'in varsayılan Helvetica'sı bu glyph'leri içermiyor.
    - family: NotoSans
      fonts:
        - asset: assets/fonts/NotoSans-Regular.ttf
        - asset: assets/fonts/NotoSans-Bold.ttf
          weight: 700

# `dart run flutter_launcher_icons` ile tüm platform ikonlarını üretir.
# Kaynak quotra_icon.png tam kare + opak (alfa yok): iOS App Store kuralına
# uygun ve siyah köşeler rozet lacivertiyle dolduruldu — maskelenince temiz.
# Splash ise şeffaf köşeli quotra_logo_transparent.png kullanır.
flutter_launcher_icons:
  image_path: "assets/images/quotra_icon.png"
  android: true
  ios: true
  macos:
    generate: true
    image_path: "assets/images/quotra_icon.png"
  windows:
    generate: true
    image_path: "assets/images/quotra_icon.png"
  web:
    generate: true
    image_path: "assets/images/quotra_icon.png"
