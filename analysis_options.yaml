# CLAUDE.md'deki kurallar burada analyzer tarafından zorunlu kılınır.
# Lint ile denetlenmeyen kural, kağıt üstünde kalır.
include: package:flutter_lints/flutter.yaml

analyzer:
  language:
    strict-casts: true
    strict-raw-types: true

  errors:
    invalid_annotation_target: ignore # Riverpod/Drift codegen gürültüsü

  exclude:
    - "**/*.g.dart"
    - "**/*.drift.dart"
    - "**/generated_plugin_registrant.dart"
    - "lib/l10n/generated/**"
    - "test/drift_schemas/**" # drift_dev tarafından üretilir, elle düzenlenmez

linter:
  rules:
    # --- Doğruluk (CLAUDE.md: veri kutsaldır) ---
    - use_build_context_synchronously
    - always_declare_return_types
    - avoid_dynamic_calls
    - avoid_slow_async_io
    - cancel_subscriptions # memory leak: StreamSubscription
    - close_sinks

    # --- Performans (CLAUDE.md: rebuild kontrolü) ---
    - prefer_const_constructors
    - prefer_const_constructors_in_immutables
    - prefer_const_declarations
    - prefer_const_literals_to_create_immutables
    - avoid_unnecessary_containers
    - sized_box_for_whitespace

    # --- Okunabilirlik ---
    - prefer_single_quotes
    - avoid_print # loglama core/utils/logger üzerinden
    - unnecessary_await_in_return
    - use_super_parameters
    - directives_ordering
    - require_trailing_commas
